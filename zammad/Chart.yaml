apiVersion: v2
name: zammad
version: 17.0.0
appVersion: 7.1.1-0000
description: Zammad is a web based open source helpdesk/customer support system with many features to manage customer communication via several channels like telephone, facebook, twitter, chat and e-mails.
home: https://zammad.org
icon: https://raw.githubusercontent.com/zammad/zammad-documentation/main/images/zammad_logo_600x520.png
sources:
  - https://github.com/zammad/zammad
  - https://github.com/zammad/zammad-helm
maintainers:
  - name: monotek
    email: monotek23@gmail.com
  - name: mgruner
    email: enjoy@zammad.com
dependencies:
  # Official Elastic way to run Elasticsearch: the eck-elasticsearch chart deploys
  # an Elasticsearch custom resource that is reconciled by the ECK operator.
  # The ECK operator (+ CRDs) must be installed cluster-wide as a prerequisite,
  # see README. Aliased to "elasticsearch" to keep the values key stable.
  - name: eck-elasticsearch
    alias: elasticsearch
    repository: https://helm.elastic.co
    version: 0.19.1
    condition: zammadConfig.elasticsearch.enabled
  - name: minio
    version: 14.10.5
    repository: https://charts.bitnami.com/bitnami
    condition: zammadConfig.minio.enabled
  - name: memcached
    version: 0.13.3
    repository: oci://ghcr.io/cloudpirates-io/helm-charts
    condition: zammadConfig.memcached.enabled
  - name: postgresql
    version: 16.7.21
    repository: https://charts.bitnami.com/bitnami
    condition: zammadConfig.postgresql.enabled
  - name: redis
    version: 0.30.5
    repository: oci://ghcr.io/cloudpirates-io/helm-charts
    condition: zammadConfig.redis.enabled
