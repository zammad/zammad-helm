apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "zammad.fullname" . }}-test-connection"
  labels:
    {{- include "zammad.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  activeDeadlineSeconds: 30
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "zammad.labels" . | nindent 8 }}
    spec:
      containers:
        - name: wget
          image: busybox
          command: ['wget']
          args: ['{{ include "zammad.fullname" . }}-nginx:{{ .Values.service.port }}']
      restartPolicy: Never
