name: ci

permissions: read-all

on:
  pull_request:
env:
  helm-version: v4.2.1
  kubeconform-version: v0.8.0

jobs:
  super-linter:
    permissions:
      statuses: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter/slim@v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: .github/linters
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_JSCPD: false
          VALIDATE_KUBERNETES_KUBECONFORM: false
          VALIDATE_YAML: false
          VALIDATE_YAML_PRETTIER: false

  lint-chart:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.helm-version }}"

      - uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (lint)
        run: ct lint --config .github/ct.yaml

  kubeconform-chart:
    runs-on: ubuntu-24.04
    needs:
      - lint-chart
      - super-linter
    strategy:
      matrix:
        k8s:
          - v1.34.8
          - v1.35.5
          - v1.36.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.helm-version }}"

      - name: Run kubeconform
        env:
          KUBERNETES_VERSION: ${{ matrix.k8s }}
          KUBECONFORM_VERSION: "${{ env.kubeconform-version }}"
        run: .github/kubeconform.sh

  install-chart:
    name: install-chart
    runs-on: ubuntu-24.04
    needs:
      - kubeconform-chart
    strategy:
      matrix:
        k8s:
          # Versions of kindest/node
          - v1.33.7
          - v1.34.3
          - v1.35.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.helm-version }}"

      - uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: if [[ -n "$(ct list-changed --config .github/ct.yaml)" ]]; then echo 'changed=true' >> "$GITHUB_OUTPUT"; fi

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        if: steps.list-changed.outputs.changed == 'true'
        with:
          config: .github/kind-config.yaml
          node_image: kindest/node:${{ matrix.k8s }}

      - name: Create Namespace 'zammad'
        run: kubectl create namespace zammad

      - name: Install additional objects for 'full' test scenario
        run: kubectl create --namespace zammad --filename zammad/ci/full-objects.yaml

      - name: Run chart-testing (install)
        run: |
          ct install --config .github/ct.yaml --helm-extra-args '--timeout 900s' &
          _CT_PID=$!
          echo "ct started, PID=$_CT_PID"
          set +eo pipefail
          while kill -0 "$_CT_PID" 2>/dev/null; do
            echo "=== heartbeat $(date -u +%H:%M:%SZ), pods: $(kubectl get pods --namespace zammad --no-headers 2>/dev/null | wc -l | tr -d ' ') ==="
            kubectl get pods --namespace zammad --no-headers 2>/dev/null | grep -E 'helm-test|test-connection' | awk '{print $1, $3}' || true
            for pod in $(kubectl get pods --namespace zammad --output name 2>/dev/null | grep -E 'helm-test|test-connection' | sed 's|pod/||'); do
              echo "--- logs $pod (last 35s) ---"
              kubectl logs --namespace zammad "$pod" --all-containers --timestamps --since=35s 2>&1 || true
            done
            sleep 30
          done
          wait "$_CT_PID"
