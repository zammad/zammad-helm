name: ci

permissions: read-all

on:
  pull_request:
env:
  helm-version: v4.2.1
  kubeconform-version: v0.8.0

jobs:
  super-linter:
    permissions:
      statuses: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter/slim@v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: .github/linters
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_JSCPD: false
          VALIDATE_KUBERNETES_KUBECONFORM: false
          VALIDATE_YAML: false
          VALIDATE_YAML_PRETTIER: false

  lint-chart:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.helm-version }}"

      - uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (lint)
        run: ct lint --config .github/ct.yaml

  kubeconform-chart:
    runs-on: ubuntu-24.04
    needs:
      - lint-chart
      - super-linter
    strategy:
      matrix:
        k8s:
          - v1.34.8
          - v1.35.5
          - v1.36.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.helm-version }}"

      - name: Run kubeconform
        env:
          KUBERNETES_VERSION: ${{ matrix.k8s }}
          KUBECONFORM_VERSION: "${{ env.kubeconform-version }}"
        run: .github/kubeconform.sh

  install-chart:
    name: install-chart
    runs-on: ubuntu-24.04
    needs:
      - kubeconform-chart
    strategy:
      matrix:
        k8s:
          # Versions of kindest/node
          - v1.33.7
          - v1.34.3
          - v1.35.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "${{ env.helm-version }}"

      - uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: if [[ -n "$(ct list-changed --config .github/ct.yaml)" ]]; then echo 'changed=true' >> "$GITHUB_OUTPUT"; fi

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        if: steps.list-changed.outputs.changed == 'true'
        with:
          config: .github/kind-config.yaml
          node_image: kindest/node:${{ matrix.k8s }}

      - name: Create Namespace 'zammad'
        run: kubectl create namespace zammad

      - name: Install additional objects for 'full' test scenario
        run: kubectl create --namespace zammad --filename zammad/ci/full-objects.yaml

      - name: Run chart-testing (install)
        run: |
          # Every 30 s dump recent logs from any helm-test/test-connection pods
          # (including init containers). Uses a short --since window so each dump
          # only shows new lines. Plain echo + kubectl flushes immediately even
          # when stdout is a pipe, avoiding the buffering problem of --follow.
          (
            set +eo pipefail
            while true; do
              sleep 30
              while IFS= read -r pod; do
                [[ -z "$pod" ]] && continue
                echo "--- $(date -u +%H:%M:%SZ) $pod ---"
                kubectl logs --namespace zammad "$pod" --all-containers \
                  --timestamps --prefix --since=35s 2>&1
              done < <(kubectl get pods --namespace zammad --no-headers 2>/dev/null \
                | awk '{print $1}' | grep -E 'helm-test|test-connection')
            done
          ) &
          _LOG_WATCHER=$!
          ct install --config .github/ct.yaml --helm-extra-args '--timeout 900s'
          _EXIT=$?
          kill $_LOG_WATCHER 2>/dev/null || true
          exit $_EXIT
